version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stagevault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stagevault
      POSTGRES_PASSWORD: stagevault
      POSTGRES_DB: stagevault
    ports:
      - '5432:5432'
    volumes:
      - .docker-data/postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: stagevault-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - .docker-data/minio:/data
